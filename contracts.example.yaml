# Framework-level probes for apps registry, capabilities, and chat are enforced
# by the engine automatically. Add product-specific contracts here and then
# point ENGINE_RUNTIME_CONTRACTS_PATH / RUNTIME_CONTRACTS_PATH at the copied file.
#
# When to add contracts:
# - Every mounted app with a user-visible summary, list, search, or action route
# - Any payload shape that the frontend depends on and cannot silently drift
# - Any backend file that must continue existing when the frontend app is present
#
# Starter kit patterns:
# 1. Read-only dashboard app: one GET summary probe with required JSON fields
# 2. Search/list app: one POST search probe with required JSON and list fields
# 3. Command app: one POST action route with accepted statuses such as 200/202/422
apps: {}

