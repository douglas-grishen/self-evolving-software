###############################################################################
# Production docker-compose — runs on a single EC2 instance
#
# Two-plane architecture for open-source compatibility:
#
#   /opt/self-evolving-software/   Framework (from GitHub via CodeDeploy)
#   /opt/evolved-app/              Evolved code (local git, never pushed)
#
# The engine evolves code in /opt/evolved-app/ (backend + frontend).
# The shared framework repo stays immutable at runtime. Instance-local mutable
# state lives in the evolved app and its state directory. Versioned overlays
# are bootstrap-only seeds for first deployment.
#
#   ┌───────────────────────────────────────────────────────────────┐
#   │  OPERATIONAL PLANE (operational-plane network)                │
#   │  Built from /opt/evolved-app/ (locally evolved code)          │
#   │                                                               │
#   │  ┌──────────┐  ┌──────────┐  ┌─────────────────────────────┐ │
#   │  │ postgres │──│ backend  │──│ frontend (Nginx :80)        │─┼─► Users
#   │  │ (5432)   │  │ (8000)   │  │ proxies /api → 8000        │ │
#   │  └──────────┘  └────┬─────┘  └─────────────────────────────┘ │
#   └──────────────────────┼────────────────────────────────────────┘
#                          │ control-plane network
#   ┌──────────────────────┼────────────────────────────────────────┐
#   │  EVOLUTION PLANE     │       (evolution-plane network)        │
#   │  AI engine — continuous MAPE-K feedback loop                  │
#   │                                                               │
#   │  ┌───────────────────┴──────────────────────────────────────┐ │
#   │  │ engine                                                   │ │
#   │  │ MONITOR ─► ANALYZE ─► PLAN ─► EXECUTE ─► KNOWLEDGE      │ │
#   │  │   Local deploy: copy to evolved-app → git commit local   │ │
#   │  │   → docker compose build → restart services              │ │
#   │  └──────────────────────────────────────────────────────────┘ │
#   └───────────────────────────────────────────────────────────────┘
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down
#
# Requires a .env file with POSTGRES_PASSWORD set.
# Migration note: the runtime observer still recognizes legacy subsystem labels
# during rollout, but new deployments use operational-plane and evolution-plane.
###############################################################################


# =============================================================================
# OPERATIONAL PLANE — Built from evolved-app (locally evolved code)
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-managed_app}
    volumes:
      - /mnt/pgdata/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - operational-plane
    labels:
      com.ses.subsystem: "operational-plane"
      com.ses.role: "database"
      com.ses.instance: "${INSTANCE_KEY:-base}"

  backend:
    build:
      context: ${EVOLVED_APP_ROOT:-/opt/evolved-app}/backend
      target: base
    restart: always
    environment:
      APP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-managed_app}
      APP_APP_NAME: ${APP_APP_NAME:-Managed App}
      APP_DEBUG: "false"
      APP_ENVIRONMENT: production
      APP_ALLOWED_ORIGINS: '["http://${PUBLIC_HOST:-localhost}", "https://${PUBLIC_HOST:-localhost}"]'
      AWS_REGION: ${AWS_REGION:-us-east-1}
      ENGINE_LLM_PROVIDER: ${ENGINE_LLM_PROVIDER:-bedrock}
      ENGINE_BEDROCK_REGION: ${ENGINE_BEDROCK_REGION:-us-east-1}
      ENGINE_BEDROCK_MODEL_ID: ${ENGINE_BEDROCK_MODEL_ID:-global.anthropic.claude-sonnet-4-20250514-v1:0}
      ENGINE_ANTHROPIC_API_KEY: ${ENGINE_ANTHROPIC_API_KEY:-}
      ENGINE_ANTHROPIC_MODEL: ${ENGINE_ANTHROPIC_MODEL:-claude-sonnet-4-5-20250929}
      ENGINE_OPENAI_API_KEY: ${ENGINE_OPENAI_API_KEY:-}
      ENGINE_OPENAI_MODEL: ${ENGINE_OPENAI_MODEL:-gpt-5.2}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - operational-plane
      - control-plane
    labels:
      com.ses.subsystem: "operational-plane"
      com.ses.role: "backend-api"
      com.ses.instance: "${INSTANCE_KEY:-base}"

  frontend:
    build:
      context: ${EVOLVED_APP_ROOT:-/opt/evolved-app}/frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - operational-plane
    labels:
      com.ses.subsystem: "operational-plane"
      com.ses.role: "frontend-proxy"
      com.ses.instance: "${INSTANCE_KEY:-base}"


# =============================================================================
# EVOLUTION PLANE — AI engine running the continuous MAPE-K loop
#
# Volumes:
#   /workspace (ro)      — framework repo for scanning templates + engine code
#   /opt/evolved-app (rw) — the locally evolved app code (deploy target)
#   docker.sock          — sandbox containers + Operational Plane log access
# =============================================================================

  engine:
    build: ./evolving_engine
    command: ["--continuous"]
    restart: always
    environment:
      # --- Scope: what the engine can observe and modify ---
      # In production the managed app lives in ${EVOLVED_APP_ROOT}, not in the
      # read-only GitHub template mounted at /workspace/managed_app.
      ENGINE_OPERATIONAL_PLANE_PATH: ${EVOLVED_APP_ROOT:-/opt/evolved-app}
      ENGINE_SELF_PATH: /workspace/evolving_engine
      ENGINE_WORKSPACE_PATH: /tmp/evo_workspace
      ENGINE_SANDBOX_TMP_DIR: /sandbox-tmp
      ENGINE_USAGE_STATE_PATH: ${USAGE_STATE_PATH:-/tmp/evolving_engine_usage.json}
      ENGINE_REPO_ROOT: /workspace
      ENGINE_FRAMEWORK_INVARIANTS_PATH: /workspace/framework_invariants.yaml
      ENGINE_GENESIS_PATH: ${GENESIS_PATH:-/opt/evolved-app/.instance-state/genesis.yaml}
      ENGINE_PURPOSE_PATH: ${PURPOSE_PATH:-/opt/evolved-app/.instance-state/purpose.yaml}
      ENGINE_PURPOSE_HISTORY_PATH: ${PURPOSE_HISTORY_PATH:-/opt/evolved-app/.instance-state/purpose_history}
      ENGINE_RUNTIME_CONTRACTS_PATH: ${RUNTIME_CONTRACTS_PATH:-/opt/evolved-app/.instance-state/contracts.yaml}
      # --- Local deploy (never pushes to GitHub) ---
      ENGINE_EVOLVED_APP_PATH: ${EVOLVED_APP_ROOT:-/opt/evolved-app}
      ENGINE_DEPLOY_ROOT: /workspace
      ENGINE_COMPOSE_FILE: ${COMPOSE_FILE:-docker-compose.prod.yml}
      ENGINE_COMPOSE_PROJECT: ${COMPOSE_PROJECT:-self-evolving-software}
      # --- Runtime monitoring ---
      ENGINE_MONITOR_URL: http://backend:8000
      ENGINE_MONITOR_INTERVAL_SECONDS: "60"
      # --- LLM Provider (from .env: anthropic or bedrock) ---
      ENGINE_LLM_PROVIDER: ${ENGINE_LLM_PROVIDER:-bedrock}
      ENGINE_BEDROCK_REGION: ${ENGINE_BEDROCK_REGION:-us-east-1}
      ENGINE_BEDROCK_MODEL_ID: ${ENGINE_BEDROCK_MODEL_ID:-global.anthropic.claude-sonnet-4-20250514-v1:0}
      ENGINE_ANTHROPIC_API_KEY: ${ENGINE_ANTHROPIC_API_KEY:-}
      ENGINE_ANTHROPIC_MODEL: ${ENGINE_ANTHROPIC_MODEL:-claude-sonnet-4-5-20250929}
      ENGINE_OPENAI_API_KEY: ${ENGINE_OPENAI_API_KEY:-}
      ENGINE_OPENAI_MODEL: ${ENGINE_OPENAI_MODEL:-gpt-5.2}
      # --- Sandbox (Docker-based validation) ---
      ENGINE_SANDBOX_TYPE: docker
      # --- Observability ---
      ENGINE_LOG_LEVEL: INFO
    volumes:
      # Framework repo (read-only — for scanning templates and engine code)
      - .:/workspace:ro
      # Evolved app (read-write — deploy target for local evolutions)
      - ${EVOLVED_APP_ROOT:-/opt/evolved-app}:${EVOLVED_APP_ROOT:-/opt/evolved-app}
      # Docker socket for sandbox containers + reading Operational Plane logs
      - /var/run/docker.sock:/var/run/docker.sock
    tmpfs:
      - /sandbox-tmp:size=1536m,mode=1777
    networks:
      - evolution-plane
      - control-plane
    labels:
      com.ses.subsystem: "evolution-plane"
      com.ses.role: "mape-k-engine"
      com.ses.instance: "${INSTANCE_KEY:-base}"


# =============================================================================
# NETWORK TOPOLOGY
#
#   operational-plane:   Operational Plane traffic
#   control-plane:       Evolution Plane observation of runtime contracts
#   evolution-plane:     Evolution Plane internals
# =============================================================================

networks:
  operational-plane:
    name: ${COMPOSE_PROJECT:-self-evolving-software}-operational-plane
    driver: bridge
  control-plane:
    name: ${COMPOSE_PROJECT:-self-evolving-software}-control-plane
    driver: bridge
  evolution-plane:
    name: ${COMPOSE_PROJECT:-self-evolving-software}-evolution-plane
    driver: bridge
