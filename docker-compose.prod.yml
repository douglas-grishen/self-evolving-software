###############################################################################
# Production docker-compose — runs on a single EC2 instance
#
# Two-layer architecture for open-source compatibility:
#
#   /opt/self-evolving-software/   Framework (from GitHub via CodeDeploy)
#   /opt/evolved-app/              Evolved code (local git, never pushed)
#
# The engine evolves code in /opt/evolved-app/ (backend + frontend).
# The framework repo on GitHub stays clean — no instance-specific code.
#
#   ┌───────────────────────────────────────────────────────────────┐
#   │  MANAGED SYSTEM (managed-system network)                      │
#   │  Built from /opt/evolved-app/ (locally evolved code)          │
#   │                                                               │
#   │  ┌──────────┐  ┌──────────┐  ┌─────────────────────────────┐ │
#   │  │ postgres │──│ backend  │──│ frontend (Nginx :80)        │─┼─► Users
#   │  │ (5432)   │  │ (8000)   │  │ proxies /api → 8000        │ │
#   │  └──────────┘  └────┬─────┘  └─────────────────────────────┘ │
#   └──────────────────────┼────────────────────────────────────────┘
#                          │ control-plane network
#   ┌──────────────────────┼────────────────────────────────────────┐
#   │  AUTONOMIC MANAGER   │      (autonomic-manager network)       │
#   │  AI engine — continuous MAPE-K feedback loop                  │
#   │                                                               │
#   │  ┌───────────────────┴──────────────────────────────────────┐ │
#   │  │ engine                                                   │ │
#   │  │ MONITOR ─► ANALYZE ─► PLAN ─► EXECUTE ─► KNOWLEDGE      │ │
#   │  │   Local deploy: copy to evolved-app → git commit local   │ │
#   │  │   → docker compose build → restart services              │ │
#   │  └──────────────────────────────────────────────────────────┘ │
#   └───────────────────────────────────────────────────────────────┘
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down
#
# Requires a .env file with POSTGRES_PASSWORD set.
###############################################################################


# =============================================================================
# MANAGED SYSTEM — Built from evolved-app (locally evolved code)
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-managed_app}
    volumes:
      - /mnt/pgdata/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - managed-system
    labels:
      com.ses.subsystem: "managed-system"
      com.ses.role: "database"

  backend:
    build:
      context: /opt/evolved-app/backend
      target: base
    restart: always
    environment:
      APP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-managed_app}
      APP_DEBUG: "false"
      APP_ENVIRONMENT: production
      APP_ALLOWED_ORIGINS: '["http://${PUBLIC_HOST:-localhost}", "https://${PUBLIC_HOST:-localhost}"]'
      AWS_REGION: ${AWS_REGION:-us-east-1}
      ENGINE_LLM_PROVIDER: ${ENGINE_LLM_PROVIDER:-bedrock}
      ENGINE_BEDROCK_REGION: ${ENGINE_BEDROCK_REGION:-us-east-1}
      ENGINE_BEDROCK_MODEL_ID: ${ENGINE_BEDROCK_MODEL_ID:-global.anthropic.claude-sonnet-4-20250514-v1:0}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - managed-system
      - control-plane
    labels:
      com.ses.subsystem: "managed-system"
      com.ses.role: "backend-api"

  frontend:
    build:
      context: /opt/evolved-app/frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - managed-system
    labels:
      com.ses.subsystem: "managed-system"
      com.ses.role: "frontend-proxy"


# =============================================================================
# AUTONOMIC MANAGER — AI engine running the continuous MAPE-K loop
#
# Volumes:
#   /workspace (ro)      — framework repo for scanning templates + engine code
#   /opt/evolved-app (rw) — the locally evolved app code (deploy target)
#   docker.sock          — sandbox containers + managed system log access
# =============================================================================

  engine:
    build: ./evolving_engine
    command: ["--continuous"]
    restart: always
    environment:
      # --- Scope: what the engine can observe and modify ---
      # In production the managed app lives in /opt/evolved-app, not in the
      # read-only GitHub template mounted at /workspace/managed_app.
      ENGINE_MANAGED_APP_PATH: /opt/evolved-app
      ENGINE_SELF_PATH: /workspace/evolving_engine
      ENGINE_WORKSPACE_PATH: /tmp/evo_workspace
      ENGINE_REPO_ROOT: /workspace
      ENGINE_GENESIS_PATH: /workspace/genesis.yaml
      ENGINE_PURPOSE_PATH: /workspace/purpose.yaml
      ENGINE_PURPOSE_HISTORY_PATH: /workspace/purpose_history
      # --- Local deploy (never pushes to GitHub) ---
      ENGINE_EVOLVED_APP_PATH: /opt/evolved-app
      ENGINE_DEPLOY_ROOT: /workspace
      ENGINE_COMPOSE_FILE: docker-compose.prod.yml
      # --- Runtime monitoring ---
      ENGINE_MONITOR_URL: http://backend:8000
      ENGINE_MONITOR_INTERVAL_SECONDS: "60"
      # --- LLM Provider (from .env: anthropic or bedrock) ---
      ENGINE_LLM_PROVIDER: ${ENGINE_LLM_PROVIDER:-bedrock}
      ENGINE_BEDROCK_REGION: ${ENGINE_BEDROCK_REGION:-us-east-1}
      ENGINE_BEDROCK_MODEL_ID: ${ENGINE_BEDROCK_MODEL_ID:-global.anthropic.claude-sonnet-4-20250514-v1:0}
      ENGINE_ANTHROPIC_API_KEY: ${ENGINE_ANTHROPIC_API_KEY:-}
      ENGINE_ANTHROPIC_MODEL: ${ENGINE_ANTHROPIC_MODEL:-claude-sonnet-4-5-20250929}
      # --- Sandbox (Docker-based validation) ---
      ENGINE_SANDBOX_TYPE: docker
      # --- Observability ---
      ENGINE_LOG_LEVEL: INFO
    volumes:
      # Framework repo (read-only — for scanning templates and engine code)
      - .:/workspace:ro
      # Evolved app (read-write — deploy target for local evolutions)
      - /opt/evolved-app:/opt/evolved-app
      # Docker socket for sandbox containers + reading managed system logs
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - autonomic-manager
      - control-plane
    labels:
      com.ses.subsystem: "autonomic-manager"
      com.ses.role: "mape-k-engine"


# =============================================================================
# NETWORK TOPOLOGY
#
#   managed-system:      postgres <-> backend <-> frontend (internal traffic)
#   control-plane:       engine -> backend (runtime monitoring, read-only)
#   autonomic-manager:   engine (LLM calls, sandbox, Git, AWS APIs)
# =============================================================================

networks:
  managed-system:
    name: managed-system
    driver: bridge
  control-plane:
    name: control-plane
    driver: bridge
  autonomic-manager:
    name: autonomic-manager
    driver: bridge
