server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Secret settings must stay on the control-plane path used by the engine.
    # The public UI only needs masked list responses plus PUT updates.
    location ~ ^/api/v1/settings/(anthropic_api_key|openai_api_key)$ {
        if ($request_method = GET) {
            return 404;
        }
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}
